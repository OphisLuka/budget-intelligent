<svg width="240" height="304" viewBox="0 0 240 304"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lg_fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7EC8E3" stop-opacity="0.22"/>
      <stop offset="50%"  stop-color="#B8D8F0" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#6AAED6" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="lg_shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="45%"  stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="lg_row" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.0"/>
      <stop offset="8%"   stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="92%"  stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0"/>
    </linearGradient>
    <clipPath id="card_clip">
      <rect x="4" y="4" width="232" height="296" rx="10"/>
    </clipPath>
  </defs>

  <!-- Fond sombre de la page derrière (simule la transparence) -->
  <rect x="0" y="0" width="240" height="304" fill="#0A0A12"/>

  <!-- Ombre portée -->
  <rect x="8" y="10" width="232" height="296" rx="11"
        fill="#000000" opacity="0.5"/>

  <!-- Corps principal translucide bleu -->
  <rect x="4" y="4" width="232" height="296" rx="10"
        fill="url(#lg_fill)" stroke="#0A0A18" stroke-width="4"/>

  <!-- Reflet haut -->
  <rect x="4" y="4" width="232" height="120" rx="10"
        fill="url(#lg_shine)" clip-path="url(#card_clip)"/>

  <!-- Bord supérieur lumineux cyan -->
  <line x1="20" y1="5" x2="220" y2="5"
        stroke="#00E5FF" stroke-width="2" opacity="0.75"/>

  <!-- Coins carrés lumineux -->
  <rect x="4"   y="4"   width="12" height="12"
        fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.95"/>
  <rect x="224" y="4"   width="12" height="12"
        fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.95"/>
  <rect x="4"   y="288" width="12" height="12"
        fill="none" stroke="#A855F7" stroke-width="2" opacity="0.75"/>
  <rect x="224" y="288" width="12" height="12"
        fill="none" stroke="#A855F7" stroke-width="2" opacity="0.75"/>

  <!-- TITRE principal -->
  <rect x="28" y="28" width="184" height="14" rx="3"
        fill="url(#lg_row)" opacity="0.95"/>
  <rect x="28" y="48" width="120" height="8"  rx="3"
        fill="url(#lg_row)" opacity="0.50"/>

  <!-- Séparateur haut -->
  <line x1="28" y1="66" x2="212" y2="66"
        stroke="#FFFFFF" stroke-width="0.8" opacity="0.18"/>

  <!-- Ligne 1 : icône + textes -->
  <rect x="28" y="76" width="18" height="18" rx="2"
        fill="#FFFFFF" opacity="0.55"/>
  <rect x="54" y="80" width="104" height="8" rx="2"
        fill="url(#lg_row)" opacity="0.85"/>
  <rect x="166" y="80" width="46" height="8" rx="2"
        fill="url(#lg_row)" opacity="0.40"/>

  <!-- Ligne 2 -->
  <rect x="28" y="104" width="18" height="18" rx="2"
        fill="#FFFFFF" opacity="0.45"/>
  <rect x="54" y="108" width="88" height="8"  rx="2"
        fill="url(#lg_row)" opacity="0.75"/>
  <rect x="150" y="108" width="62" height="8" rx="2"
        fill="url(#lg_row)" opacity="0.30"/>

  <!-- Ligne 3 -->
  <rect x="28" y="132" width="18" height="18" rx="2"
        fill="#FFFFFF" opacity="0.38"/>
  <rect x="54" y="136" width="116" height="8" rx="2"
        fill="url(#lg_row)" opacity="0.65"/>
  <rect x="178" y="136" width="34" height="8" rx="2"
        fill="url(#lg_row)" opacity="0.25"/>

  <!-- Séparateur milieu -->
  <line x1="28" y1="160" x2="212" y2="160"
        stroke="#FFFFFF" stroke-width="0.8" opacity="0.15"/>

  <!-- Mini graphique en barres -->
  <rect x="28"  y="196" width="20" height="38" rx="2" fill="#00E5FF" opacity="0.55"/>
  <rect x="54"  y="210" width="20" height="24" rx="2" fill="#A855F7" opacity="0.55"/>
  <rect x="80"  y="188" width="20" height="48" rx="2" fill="#00E5FF" opacity="0.38"/>
  <rect x="106" y="202" width="20" height="34" rx="2" fill="#A855F7" opacity="0.38"/>
  <rect x="132" y="216" width="20" height="20" rx="2" fill="#00E5FF" opacity="0.28"/>
  <rect x="158" y="194" width="20" height="42" rx="2" fill="#A855F7" opacity="0.28"/>
  <rect x="184" y="206" width="20" height="30" rx="2" fill="#00E5FF" opacity="0.20"/>
  <line x1="28" y1="238" x2="212" y2="238"
        stroke="#FFFFFF" stroke-width="0.6" opacity="0.18"/>

  <!-- Ligne de statut -->
  <rect x="28"  y="254" width="28"  height="6" rx="2" fill="#39FF6A" opacity="0.75"/>
  <rect x="64"  y="254" width="68"  height="6" rx="2" fill="#FFFFFF"  opacity="0.25"/>
  <rect x="140" y="254" width="40"  height="6" rx="2" fill="#FFFFFF"  opacity="0.15"/>
  <rect x="188" y="254" width="24"  height="6" rx="2" fill="#A855F7"  opacity="0.45"/>

  <!-- Ligne finale -->
  <rect x="28" y="272" width="184" height="6" rx="2"
        fill="url(#lg_row)" opacity="0.28"/>
</svg>
